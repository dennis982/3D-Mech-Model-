<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game Model Viewer - Mech Unit</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #1a1c23 0%, #0f1015 100%);
            font-family: 'Courier New', Courier, monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-left: 3px solid #00ffcc;
        }
        h1 { margin: 0 0 5px 0; font-size: 20px; letter-spacing: 2px; }
        p { margin: 0; font-size: 12px; color: #8899a6; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.18"></script>
</head>
<body>

    <div id="ui-overlay">
        <h1>MECH-UNIT // TRIDENT 01</h1>
        <p>STATUS: ACTIVE // RENDER MODE: WEBGL</p>
        <p style="margin-top: 5px;">Left Click + Drag to Rotate | Right Click to Pan</p>
    </div>
    
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls;
        let mechGroup, leftArm, rightArm, torso;
        
        // --- Configuration Parameters ---
        const config = {
            primaryColor: '#3a4454',
            secondaryColor: '#2b2d42',
            glowColor: '#00ffcc',
            armRotation: 0,
            idleAnimation: true
        };

        // Materials setup global reference
        let matPrimary, matSecondary, matGlow, matDark;

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0f1015, 0.015);

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. Orbit Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // Don't let camera go completely below ground

            // 5. Lighting Environment
            setupLighting();

            // 6. Build the Grid Floor
            const gridHelper = new THREE.GridHelper(40, 40, 0x00ffcc, 0x223344);
            gridHelper.position.y = 0;
            scene.add(gridHelper);

            // 7. Initialize Materials & Create Model
            updateMaterials();
            buildMechModel();

            // 8. GUI Setup
            setupGUI();

            // 9. Resize Handling & Frame Loop
            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function setupLighting() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 15, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            const rimLight = new THREE.DirectionalLight(0x00ffcc, 0.4);
            rimLight.position.set(-5, 5, -5);
            scene.add(rimLight);
        }

        function updateMaterials() {
            matPrimary = new THREE.MeshStandardMaterial({ color: config.primaryColor, roughness: 0.4, metalness: 0.7 });
            matSecondary = new THREE.MeshStandardMaterial({ color: config.secondaryColor, roughness: 0.5, metalness: 0.6 });
            matDark = new THREE.MeshStandardMaterial({ color: 0x111116, roughness: 0.7, metalness: 0.2 });
            matGlow = new THREE.MeshBasicMaterial({ color: config.glowColor });
        }

        // --- Modular Model Construction ---
        function buildMechModel() {
            if(mechGroup) scene.remove(mechGroup);
            
            mechGroup = new THREE.Group();
            mechGroup.position.y = 0; // Baseline on floor

            // --- Torso Assembly ---
            torso = new THREE.Group();
            torso.position.y = 2.8;

            const chestGeo = new THREE.CylinderGeometry(0.8, 1.2, 1.5, 6);
            const chest = new THREE.Mesh(chestGeo, matPrimary);
            chest.rotation.y = Math.PI / 6; 
            chest.castShadow = true;
            chest.receiveShadow = true;
            torso.add(chest);

            // Visor/Glow Core
            const visorGeo = new THREE.BoxGeometry(0.8, 0.15, 0.1);
            const visor = new THREE.Mesh(visorGeo, matGlow);
            visor.position.set(0, 0.4, 0.9);
            torso.add(visor);
            
            mechGroup.add(torso);

            // --- Arm Assemblies (Hierarchical Pivots) ---
            leftArm = createArm(false);
            leftArm.position.set(1.5, 0.5, 0);
            torso.add(leftArm);

            rightArm = createArm(true);
            rightArm.position.set(-1.5, 0.5, 0);
            torso.add(rightArm);

            // --- Leg Assemblies ---
            const leftLeg = createLeg();
            leftLeg.position.set(0.6, 2.2, 0);
            mechGroup.add(leftLeg);

            const rightLeg = createLeg();
            rightLeg.position.set(-0.6, 2.2, 0);
            mechGroup.add(rightLeg);

            scene.add(mechGroup);
        }

        function createArm(isLeft) {
            const armPivot = new THREE.Group();

            // Shoulder Joint
            const shoulderGeo = new THREE.SphereGeometry(0.35, 16, 16);
            const shoulder = new THREE.Mesh(shoulderGeo, matSecondary);
            armPivot.add(shoulder);

            // Upper Arm Structure
            const upperArmGeo = new THREE.BoxGeometry(0.3, 0.9, 0.3);
            const upperArm = new THREE.Mesh(upperArmGeo, matPrimary);
            upperArm.position.y = -0.5;
            upperArm.castShadow = true;
            armPivot.add(upperArm);

            // Weapon/Hand Attachment
            const forearmGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.8, 8);
            const forearm = new THREE.Mesh(forearmGeo, matSecondary);
            forearm.position.y = -1.2;
            forearm.castShadow = true;
            armPivot.add(forearm);

            // Weapon Muzzle Glow
            const barrelGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.3, 8);
            const barrel = new THREE.Mesh(barrelGeo, matDark);
            barrel.position.y = -1.6;
            armPivot.add(barrel);

            const laserGlowGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
            const laserGlow = new THREE.Mesh(laserGlowGeo, matGlow);
            laserGlow.position.y = -1.76;
            armPivot.add(laserGlow);

            return armPivot;
        }

        function createLeg() {
            const legRoot = new THREE.Group();

            // Hip joint
            const hipGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const hip = new THREE.Mesh(hipGeo, matSecondary);
            legRoot.add(hip);

            // Thigh block
            const thighGeo = new THREE.BoxGeometry(0.4, 1.0, 0.4);
            const thigh = new THREE.Mesh(thighGeo, matPrimary);
            thigh.position.y = -0.5;
            thigh.castShadow = true;
            legRoot.add(thigh);

            // Shin block
            const shinGeo = new THREE.BoxGeometry(0.3, 1.1, 0.3);
            const shin = new THREE.Mesh(shinGeo, matSecondary);
            shin.position.set(0, -1.4, 0.05);
            shin.castShadow = true;
            legRoot.add(shin);

            // Foot Plate
            const footGeo = new THREE.BoxGeometry(0.5, 0.2, 0.8);
            const foot = new THREE.Mesh(footGeo, matPrimary);
            foot.position.set(0, -2.0, 0.2);
            foot.castShadow = true;
            foot.receiveShadow = true;
            legRoot.add(foot);

            return legRoot;
        }

        // --- User Controls Interface ---
        function setupGUI() {
            const gui = new lil.GUI({ title: 'Model Configurations' });
            
            gui.addColor(config, 'primaryColor').name('Armor Plate').onChange(() => { updateMaterials(); buildMechModel(); });
            gui.addColor(config, 'secondaryColor').name('Under-Suit Frame').onChange(() => { updateMaterials(); buildMechModel(); });
            gui.addColor(config, 'glowColor').name('Energy Visor').onChange(() => { updateMaterials(); buildMechModel(); });
            
            gui.add(config, 'armRotation', -1, 1, 0.01).name('Target Arms Pivot').onChange(v => {
                if(!config.idleAnimation) {
                    leftArm.rotation.x = v;
                    rightArm.rotation.x = -v;
                }
            });
            gui.add(config, 'idleAnimation').name('Idle System State');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Game Engine Cycle Loop ---
        function animate(timestamp) {
            requestAnimationFrame(animate);

            const time = timestamp * 0.001;

            if (config.idleAnimation) {
                // Subtle rhythmic mechanical breathing movement
                torso.position.y = 2.8 + Math.sin(time * 2.0) * 0.04;
                torso.rotation.y = Math.sin(time * 0.8) * 0.05;
                
                // Opposite dynamic arm sway offsets
                leftArm.rotation.x = Math.sin(time * 2.0) * 0.15 + config.armRotation;
                rightArm.rotation.x = -Math.sin(time * 2.0) * 0.15 - config.armRotation;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
